spring.application.name=ms-auth
server.port=8081

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/peluqueria_auth?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JWT
jwt.secret=5a8f3b2e9d1c7a4f6b0e2d8c5a3f9e7b1d4c8a2f6e0b3d9c7a5f2e8b1d4c6a3f
jwt.expiration=86400000
