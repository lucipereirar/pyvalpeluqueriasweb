spring.application.name: API-Gateway
server.port: 8080

# Eureka
eureka.client.service-url.defaultZone: http://localhost:8761/eureka/
eureka.instance.prefer-ip-address: true

# Rutas del Gateway
spring.cloud.gateway.routes[0].id: ms-auth
spring.cloud.gateway.routes[0].uri: lb://ms-auth
spring.cloud.gateway.routes[0].predicates[0]: Path=/api/auth/**,/api/usuarios/**

spring.cloud.gateway.routes[1].id: ms-productos
spring.cloud.gateway.routes[1].uri: lb://ms-productos
spring.cloud.gateway.routes[1].predicates[0]: Path=/api/productos/**

spring.cloud.gateway.routes[2].id: ms-carrito
spring.cloud.gateway.routes[2].uri: lb://ms-carrito
spring.cloud.gateway.routes[2].predicates[0]: Path=/api/carrito/**

spring.cloud.gateway.routes[3].id: ms-pedidos
spring.cloud.gateway.routes[3].uri: lb://ms-pedidos
spring.cloud.gateway.routes[3].predicates[0]: Path=/api/pedidos/**

spring.cloud.gateway.routes[4].id: ms-pago
spring.cloud.gateway.routes[4].uri: lb://ms-pago
spring.cloud.gateway.routes[4].predicates[0]: Path=/api/pagos/**

spring.cloud.gateway.routes[5].id: ms-despacho
spring.cloud.gateway.routes[5].uri: lb://ms-despacho
spring.cloud.gateway.routes[5].predicates[0]: Path=/api/despachos/**

spring.cloud.gateway.routes[6].id: ms-notificaciones
spring.cloud.gateway.routes[6].uri: lb://ms-notificaciones
spring.cloud.gateway.routes[6].predicates[0]: Path=/api/notificaciones/**

spring.cloud.gateway.routes[7].id: ms-reportes
spring.cloud.gateway.routes[7].uri: lb://ms-reportes
spring.cloud.gateway.routes[7].predicates[0]: Path=/api/reportes/**

# Seguridad: el gateway valida el JWT emitido por ms-auth (mismo secreto compartido)
jwt.secret: ${JWT_SECRET:5a8f3b2e9d1c7a4f6b0e2d8c5a3f9e7b1d4c8a2f6e0b3d9c7a5f2e8b1d4c6a3f}

# CORS para el frontend (configurable por variable de entorno)
cors.allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,http://localhost:3000}

spring.autoconfigure.exclude: org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.ReactiveUserDetailsServiceAutoConfiguration

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://mysql-db:3306/peluqueria_gateway?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/