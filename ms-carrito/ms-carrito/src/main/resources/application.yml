spring.application.name: ms-carrito
server.port: 8083

# MySQL
spring.datasource.url: jdbc:mysql://localhost:3306/peluqueria_carrito?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username: root
spring.datasource.password: 
spring.datasource.driver-class-name: com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto: update
spring.jpa.show-sql: true
spring.jpa.properties.hibernate.format_sql: true
spring.jpa.properties.hibernate.dialect: org.hibernate.dialect.MySQLDialect

# Eureka
eureka.client.service-url.defaultZone: http://localhost:8761/eureka/
eureka.instance.prefer-ip-address: true

# Deshabilitar seguridad (el gateway maneja la autenticacion)
spring.autoconfigure.exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://mysql-db:3306/peluqueria_carrito?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/