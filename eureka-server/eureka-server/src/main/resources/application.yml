server.port: 8761
spring.application.name: eureka-server
eureka.client.register-with-eureka: false
eureka.client.fetch-registry: false


---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://mysql-db:3306/peluqueria_eureka?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/